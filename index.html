<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>FIFA Online</title>\n    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        #gameCanvas { width: 100%; height: 500px; background: #f0f0f0; }\n        #chat { width: 300px; float: right; border: 1px solid #ccc; padding: 10px; }\n    </style>\n</head>\n<body>\n    <h1>FIFA Online</h1>\n    <div id="chat">\n        <h2>Chat Room</h2>\n        <div id="messages"></div>\n        <input id="messageInput" type="text" placeholder="Type your message here...">\n        <button id="sendMessage">Send</button>\n    </div>\n    <canvas id="gameCanvas"></canvas>\n    <script>\n        // Socket.io connection\n        const socket = io('http://localhost:3000');\n        const canvas = document.getElementById('gameCanvas');\n        const ctx = canvas.getContext('2d');\n        let players = {};\n        let ball = { x: canvas.width / 2, y: canvas.height / 2, radius: 10 };\n\n        // Chat functionality\n        document.getElementById('sendMessage').onclick = function() {\n            const message = document.getElementById('messageInput').value;\n            socket.emit('chat message', message);\n            document.getElementById('messageInput').value = '';\n        };\n\n        socket.on('chat message', function(msg) {\n            const messagesDiv = document.getElementById('messages');\n            const newMessage = document.createElement('div');\n            newMessage.textContent = msg;\n            messagesDiv.appendChild(newMessage);\n        });\n\n        // Game mechanics for multiplayer gameplay\n        socket.on('game state', function(state) {\n            players = state.players;\n            ball = state.ball;\n            draw();\n        });\n\n        function draw() {\n            ctx.clearRect(0, 0, canvas.width, canvas.height);\n            for (let id in players) {\n                ctx.fillStyle = players[id].color;\n                ctx.fillRect(players[id].x, players[id].y, 10, 10);\n            }\n            ctx.fillStyle = 'black';\n            ctx.beginPath();\n            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);\n            ctx.fill();\n        }\n    </script>\n</body>\n</html>
